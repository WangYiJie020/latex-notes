name: Build PDFs

on:
  push:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-fonts-recommended \
            texlive-plain-generic \
            texlive-science

      - name: Verify TeX tools
        run: |
          which xelatex
          xelatex --version
          latexmk --version
          kpsewhich mathdots.sty
          kpsewhich cancel.sty
          kpsewhich extarrows.sty

      - name: Build PDFs
        run: |
          make ci-pdf || {
            find build/aux -name '*.log' -print -exec cat {} \;
            exit 1
          }

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: latex-pdfs
          path: build/out/**/*.pdf
          if-no-files-found: error
